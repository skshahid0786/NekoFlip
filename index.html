<title>NekoFlip</title>
<style>
  /* Branding Top */
.top-brand { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.brand-logo { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--pink), var(--blue)); display: flex; align-items: center; justify-content: center; font-weight: 900; font-family: 'Orbitron'; }
.brand-text { font-family: 'Orbitron', monospace; font-size: 14px; letter-spacing: 0.2em; color: #fff; }

/* Footer Bottom */
.footer-text { margin-top: 30px; text-align: center; font-size: 8px; color: rgba(255,255,255,0.2); letter-spacing: 0.1em; line-height: 1.6; }

  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pink: #ff88cc;
    --purple: #cc88ff;
    --blue: #88aaff;
    --green: #00ffa0;
    --red: #ff3366;
    --bg: #08060f;
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    padding: 16px;
    overflow-x: hidden;
    position: relative;
    color: #fff;
  }
@keyframes winPulse {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.05); opacity: 0.8; }
  100% { transform: scale(0.9); opacity: 0; }
}

.grid-cleared { animation: winPulse 0.6s ease-out forwards; }

  /* ── Background layers ── */
  .bg-radial { position: fixed; inset: 0; pointer-events: none; z-index: 0; background: radial-gradient(ellipse at 30% 20%, rgba(180,80,255,0.08) 0%, transparent 55%), radial-gradient(ellipse at 70% 80%, rgba(255,80,160,0.07) 0%, transparent 55%); }
  .bg-grid { position: fixed; inset: 0; pointer-events: none; z-index: 0; background-image: linear-gradient(rgba(255,150,220,0.028) 1px, transparent 1px), linear-gradient(90deg, rgba(255,150,220,0.028) 1px, transparent 1px); background-size: 36px 36px; }
  .bg-scan { position: fixed; inset: 0; pointer-events: none; z-index: 0; background-image: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px); }

  #app { position: relative; z-index: 1; width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center; }

  /* ── HUD ── */
  .header { width: 100%; display: grid; grid-template-columns: 1fr auto 1fr; gap: 8px; align-items: center; margin-bottom: 10px; }
  .hud-box { background: rgba(255,150,220,0.04); border: 1px solid rgba(255,150,220,0.1); border-radius: 8px; padding: 6px 10px; backdrop-filter: blur(4px); text-align: center; }
  .hud-label { font-size: 9px; color: rgba(255,180,230,0.4); letter-spacing: 0.15em; margin-bottom: 2px; }
  .hud-val { font-size: 20px; font-weight: bold; font-family: 'Orbitron', monospace; }
  .hud-val.pink { color: var(--pink); text-shadow: 0 0 8px rgba(255,100,180,0.5); }
  .hud-val.blue { color: var(--blue); text-shadow: 0 0 8px rgba(100,180,255,0.5); }

  .title-block { text-align: center; }
  .title { font-family: 'Orbitron', monospace; font-weight: 900; font-size: 16px; letter-spacing: 0.1em; background: linear-gradient(90deg, var(--pink), var(--purple), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .subtitle { font-size: 9px; color: var(--green); letter-spacing: 0.1em; margin-top: 2px; text-shadow: 0 0 5px rgba(0,255,160,0.3); }

  /* ── Controls Area ── */
  .matrix-selector { display: flex; gap: 10px; margin-bottom: 15px; background: rgba(255,255,255,0.02); padding: 6px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
  .selector-label { font-size: 11px; align-self: center; color: rgba(255,255,255,0.6); letter-spacing: 0.1em; }
  
  /* ── Bars ── */
  .bars-container { width: 100%; display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
  .bar-wrap { width: 100%; height: 4px; background: rgba(255,255,255,0.04); border-radius: 2px; overflow: hidden; position: relative; }
  .bar-fill { height: 100%; width: 0%; transition: width 0.3s ease; }
  #progress-fill { background: linear-gradient(90deg, var(--pink), var(--purple)); box-shadow: 0 0 8px var(--pink); }
  #timer-fill { background: linear-gradient(90deg, var(--blue), var(--green)); box-shadow: 0 0 8px var(--blue); width: 100%; transition: width 0.1s linear; }
  .timer-critical #timer-fill { background: var(--red); box-shadow: 0 0 12px var(--red); }

  /* ── Dynamic Grid & Cards ── */
  .grid { display: grid; gap: 8px; width: 100%; padding: 12px; background: rgba(255,150,220,0.015); border: 1px solid rgba(255,150,220,0.08); border-radius: 16px; backdrop-filter: blur(6px); box-shadow: 0 0 40px rgba(0,0,0,0.6); }
  .grid-4x4 { grid-template-columns: repeat(4, 1fr); }
  .grid-6x6 { grid-template-columns: repeat(6, 1fr); }
  .grid-8x8 { grid-template-columns: repeat(6, 1fr); }

  .card-wrap { aspect-ratio: 1; perspective: 800px; cursor: pointer; }
  .card-wrap.matched { opacity: 0.25; cursor: default; pointer-events: none; transition: opacity 0.4s; }
  .card-wrap.wrong { animation: wrongShake 0.4s ease; }

  .card-inner { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.4s cubic-bezier(0.2,0.8,0.2,1); }
  .card-wrap.flipped .card-inner, .card-wrap.matched .card-inner { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; border-radius: 6px; backface-visibility: hidden; -webkit-backface-visibility: hidden; overflow: hidden; }

  .card-back { background: linear-gradient(135deg, #0b0b16 0%, #060e1a 100%); border: 1px solid rgba(180,100,255,0.2); display: flex; align-items: center; justify-content: center; }
  .card-star { font-size: 16px; color: var(--purple); filter: drop-shadow(0 0 4px var(--purple)); }
  .grid-6x6 .card-star { font-size: 11px; }
.grid-8x8 .card-star { font-size: 11px; }

  .card-front { transform: rotateY(180deg); border: 1px solid rgba(255,160,220,0.25); }
  .card-wrap.matched .card-front { border: 2px solid var(--green); }
  .card-front img { width: 100%; height: 100%; object-fit: cover; }

  /* ── Interactive Buttons ── */
  .btn { background: rgba(255,140,220,0.05); border: 1px solid rgba(255,140,220,0.25); color: var(--pink); padding: 6px 14px; font-size: 11px; font-family: 'Share Tech Mono', monospace; letter-spacing: 0.12em; cursor: pointer; border-radius: 6px; transition: all 0.2s; }
  .btn:hover { background: rgba(255,140,220,0.12); box-shadow: 0 0 15px rgba(255,120,200,0.2); }
  .btn.active { background: rgba(0,255,160,0.15); border-color: var(--green); color: var(--green); box-shadow: 0 0 10px rgba(0,255,160,0.2); }

  /* ── Interface Screen States ── */
  .screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 55vh; text-align: center; }
  .active-screen { display: flex !important; }

  .load-title { font-family: 'Orbitron', monospace; font-size: 24px; font-weight: 900; letter-spacing: 0.15em; background: linear-gradient(90deg, var(--pink), var(--blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 6px; }
  .load-sub { font-size: 10px; color: rgba(255,150,220,0.4); letter-spacing: 0.2em; margin-bottom: 20px; }
  .win-title { font-family: 'Orbitron', monospace; font-size: 28px; font-weight: 900; color: var(--green); text-shadow: 0 0 15px var(--green); margin-bottom: 20px; }
  .lose-title { font-family: 'Orbitron', monospace; font-size: 28px; font-weight: 900; color: var(--red); text-shadow: 0 0 15px var(--red); margin-bottom: 20px; }
  
  .stat-box { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 16px 36px; margin-bottom: 24px; }
  .stat-val { font-family: 'Orbitron', monospace; font-size: 44px; font-weight: 900; color: #fff; }

  .combo-pop { position: absolute; color: var(--green); font-family: 'Orbitron', monospace; font-weight: 900; font-size: 16px; pointer-events: none; z-index: 10; animation: floatingUp 0.8s ease-out forwards; text-shadow: 0 0 8px var(--green); }
  .time-addition { color: var(--blue) !important; text-shadow: 0 0 8px var(--blue) !important; }

  @keyframes wrongShake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
  @keyframes floatingUp { 0% { transform: translateY(0) scale(0.7); opacity: 1; } 100% { transform: translateY(-35px) scale(1.1); opacity: 0; } }
</style>
</head>
<script>(function(s){s.dataset.zone='11029007',s.src='https://n6wxm.com/vignette.min.js'})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')))</script>
  
<body>

<div class="bg-radial"></div>
<div class="bg-grid"></div>
<div class="bg-scan"></div>
<div class="top-brand">
  <div class="brand-logo">NF</div> <div class="brand-text">NekoFlip</div>
</div>

<div id="app">

 <div class="matrix-selector" id="matrix-settings">
  <span class="selector-label">GRID:</span>
  <button class="btn active" id="btn-4x4" onclick="adjustGridSize(4)">4x4</button>
  <button class="btn" id="btn-6x6" onclick="adjustGridSize(6)">6x6</button>
  <button class="btn" id="btn-8x8" onclick="adjustGridSize(8)">8x8</button>
</div>


<div id="win-screen" class="screen">
  <div class="win-title">GRID DECRYPTED</div>
  <div class="stat-box">
    <div class="stat-val" id="win-score">0</div>
  </div>
  <div style="display:flex; gap:10px;">
    <button class="btn" onclick="initGame()">RETRY</button>
    <button class="btn" onclick="shareGame()">SHARE</button>
  </div>
</div>



  <div id="loading-screen" class="screen active-screen">
    <div class="load-title">INITIALIZING DATA GRID</div>
    <div class="load-sub" id="load-status">SYNCING CORE FILE ARRAYS...</div>
  </div>

  <div id="error-screen" class="screen">
    <p style="color:var(--red); margin-bottom:15px;">DATA ACCESS MATRIX FAULT</p>
    <button class="btn" onclick="initGame()">RESET INTERFACE</button>
  </div>




  <div id="lose-screen" class="screen">
    <div class="lose-title">SYSTEM EXPIRATION</div>
    <div class="stat-box">
      <div style="font-size:10px; color:rgba(255,50,100,0.5); letter-spacing:0.15em;">TOTAL SECURED POINTS</div>
      <div class="stat-val" id="lose-score" style="color:var(--red)">0</div>
    </div>
    <button class="btn" onclick="initGame()">REBOOT INTERFACE ENGINE</button>
  </div>

  <div id="game-screen" class="screen" style="width:100%;">
    <div class="header">
      <div class="hud-box">
        <div class="hud-label">SCORE</div>
        <div class="hud-val pink" id="hud-score">0</div>
      </div>
      <div class="title-block">
        <div class="title" id="hud-category">TAG: SCANNING</div>
        <div class="subtitle" id="hud-combo">STREAK: X1</div>
      </div>
      <div class="hud-box">
        <div class="hud-label">TIME</div>
        <div class="hud-val blue" id="hud-timer">60s</div>
      </div>
    </div>

    <div class="bars-container">
      <div class="bar-wrap"><div class="bar-fill" id="progress-fill"></div></div>
      <div class="bar-wrap" id="timer-wrapper"><div class="bar-fill" id="timer-fill"></div></div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="bottom-bar">
      <button class="btn" onclick="initGame()">CYCLE RUNSTAGE</button>
    </div>
  </div>

</div>

<div class="footer-text">
  <p>© 2026 NekoFlip </p>
  <p>System Architecture: Async Fetch API + Web Audio Synth</p>
</div>

<script src="script.js"></script>
</body>
</html>
